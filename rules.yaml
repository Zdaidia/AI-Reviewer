# Dev Quality Inspector - Code Rules Configuration
#
# 规则格式:
# - id: 规则唯一标识
#   name: 规则名称
#   severity: error | warning | info
#   languages: 适用语言
#   pattern: 正则表达式或 AST 匹配模式
#   message: 违规提示信息
#   suggestion: 修改建议
#   autoFix: 是否支持自动修复

# JavaScript/TypeScript 规则
- id: JS-001
  name: No console.log in production
  severity: warning
  languages: [javascript, typescript]
  pattern: "console\\.log\\("
  message: "Console.log statement found"
  suggestion: "Remove console.log or replace with proper logging library"
  autoFix: true

- id: JS-002
  name: No var declarations
  severity: error
  languages: [javascript, typescript]
  pattern: "\\bvar\\s+[a-zA-Z_$]"
  message: "Var declaration found"
  suggestion: "Use 'let' or 'const' instead of 'var'"
  autoFix: true

# JS 空值检查规则（上下文分析）
- id: JS-NULL-001
  name: Optional chaining missing (context-aware)
  severity: warning
  languages: [javascript, typescript]
  # 已改为上下文分析检测 - 由 analyzeJSOptionalChain() 方法实现
  # 检测逻辑：识别变量定义（可能为 null/undefined），追踪属性访问，检查是否有 ?. 保护
  # pattern 仅用于文档说明，实际检测由 scanner/index.js 实现
  pattern: "N/A - context-aware detection"
  message: "属性访问缺少可选链保护，变量可能为 null/undefined"
  suggestion: "使用可选链 ?. 进行安全的属性访问：obj?.property"
  autoFix: false

- id: JS-NULL-002
  name: Array method result missing null check (context-aware)
  severity: warning
  languages: [javascript, typescript]
  # 已改为上下文分析检测 - 由 analyzeJSFindResult() 方法实现
  # 检测逻辑：识别 find/filter/findIndex 等 Array 方法调用，追踪返回值使用，检查是否有空值保护
  # pattern 仅用于文档说明，实际检测由 scanner/index.js 实现
  pattern: "N/A - context-aware detection"
  message: "Array.find() 等方法可能返回 undefined，缺少空值检查"
  suggestion: "使用空值保护：if (result) { ... } 或 result?.property 或 result ?? defaultValue"
  autoFix: false

