# Dart 空值检查规则
# 注意：DART-NULL-001 和 DART-NULL-002 已改为上下文分析检测
# 由 analyzeDartNullableListAccess() 方法实现，检测逻辑：
# 1. 识别 nullable list 变量定义（List<T?>, RxList<T?>）
# 2. 追踪这些变量的 .first/.last 使用
# 3. 检查使用前是否有空值保护（isEmpty, isNotEmpty, if 判断）
# 只有在没有空值保护时才触发规则

# DART-NULL-001 已移除 - 由上下文分析替代
# 原正则 `(RxList|List)<[^>]+\\?>` 会误报所有变量定义行

# DART-NULL-002 已移除单行正则检测 - 由上下文分析替代
# 原正则无法检测空值保护上下文

# DART-NULL-003 已移除 - 由上下文分析替代
# 原正则 `RxList<[^>]*>\(\)` 会误报所有 RxList 构造调用
# 新的 analyzeDartNullableListAccess() 方法已能检测 unsafe .first/.last 使用

- id: DART-NULL-004
  name: Force unwrap operator (context-aware)
  severity: warning
  languages: [dart]
  # 已改为上下文分析检测 - 由 analyzeDartForceUnwrap() 方法实现
  # 检测逻辑：识别 ! 强制解包，检查使用前是否有空值保护（if null check, ?.）
  # pattern 仅用于文档说明，实际检测由 scanner/index.js 实现
  pattern: "N/A - context-aware detection"
  message: "使用 ! 强制解包可能导致运行时空指针异常"
  suggestion: "使用 ?. 或 ?? 操作符进行安全的空值处理，或在使用前进行空值检查"
  autoFix: false

- id: DART-NULL-005
  name: Unsafe nullable property chain (context-aware)
  severity: warning
  languages: [dart]
  # 已改为上下文分析检测 - 由 analyzeDartPropertyChain() 方法实现
  # 检测逻辑：识别多层属性访问 a.b.c，检查中间属性是否为 nullable 且无 ?. 保护
  # pattern 仅用于文档说明，实际检测由 scanner/index.js 实现
  pattern: "N/A - context-aware detection"
  message: "多层属性访问缺少空值保护，中间属性可能为 null"
  suggestion: "使用可选链 ?. 保护中间属性访问：a?.b?.c"
  autoFix: false

- id: DART-NULL-006
  name: Late variable potential null access (context-aware)
  severity: warning
  languages: [dart]
  # 已改为上下文分析检测 - 由 analyzeDartLateVariable() 方法实现
  # 检测逻辑：识别 late 变量定义，检查是否在 initState/构造函数中初始化，追踪使用位置
  # pattern 仅用于文档说明，实际检测由 scanner/index.js 实现
  pattern: "N/A - context-aware detection"
  message: "late 变量在初始化前访问会抛出 LateInitializationError"
  suggestion: "确保在 initState/构造函数中完成初始化，或考虑使用 nullable 类型 ?"
  autoFix: false

