# Dev Quality Inspector - Code Fix Rules
#
# 修复规则格式:
# - id: 规则ID（对应扫描规则ID）
#   pattern: 匹配正则表达式
#   fix: 修复模板（使用 $1, $2 等捕获组）
#   insertAbove: 是否在上方插入（用于 TODO 注释）
#   comment: 插入的注释模板

# JavaScript/TypeScript 修复规则
- id: JS-001
  name: 生产代码中的 console.log
  pattern: "(\\s*)console\\.log\\(([^)]*)\\);?"
  fix: ""
  insertAbove: false
  comment: "// TODO: [JS-001] 生产代码中使用了 console.log - 请移除或使用日志库"

- id: JS-002
  name: 使用 const 替代 var
  pattern: "\\bvar\\s+([a-zA-Z_$][a-zA-Z0-9_$]*)\\s*="
  fix: "const $1 ="
  insertAbove: false
  comment: "// TODO: [JS-002] 使用了 var 声明变量 - 建议使用 const 或 let"

- id: JS-004
  name: map 添加 key 属性
  pattern: "(\\s+)([a-zA-Z_$][a-zA-Z0-9_$]*)\\.map\\(([^)]+)\\)\\s*=>\\s*<([a-zA-Z]+)([^>]*)>"
  fix: "$1$2.map(($3, index) => <$4 key={index}$5>"
  insertAbove: true
  comment: "// TODO: [JS-004] map 缺少 key 属性 - 请添加唯一 key 属性到列表元素"

- id: TS-002
  name: 使用 unknown 替代 any
  pattern: ":\\s*any\\b"
  fix: ": unknown"
  insertAbove: false
  comment: "// TODO: [TS-002] 使用了 any 类型 - 建议使用 unknown 替代 any"

# Vue 修复规则
- id: VUE-001
  name: v-for 添加 key 属性
  pattern: "(v-for=[\"'][^\"']+[\"'])([^>]*)(?!.*v-key)"
  fix: "$1 :key=\"index\"$2"
  insertAbove: true
  comment: "// TODO: [VUE-001] v-for 缺少 key 属性 - 请添加 :key 绑定"

- id: VUE-003
  name: 移除模板中的 console
  pattern: "\\{\\{\\s*console\\.log\\(([^)]*)\\)\\s*\\}\\}"
  fix: ""
  insertAbove: false
  comment: "// TODO: [VUE-003] Remove console from template"

# Dart 修复规则
- id: DART-001
  name: Add type annotation
  pattern: "\\bvar\\s+([a-zA-Z_$][a-zA-Z0-9_$]*)\\s*=\\s*([^{;]+);"
  fix: "final $1 = $2;"
  insertAbove: true
  comment: "// TODO: [DART-001] Use 'final' with explicit type"

# 通用 TODO 格式化规则
- id: GEN-004
  name: Format TODO comment
  pattern: "//\\s*TODO\\s*([^\\[][^\\n]*)"
  fix: "// TODO: [CUSTOM] $1"
  insertAbove: false
  comment: null
